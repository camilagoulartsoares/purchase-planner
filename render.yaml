# Exported via Blueprint Spec, v1
services:
  - type: web
    name: closet-sonhos-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /api/health/db
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_FOLDER
        value: closet-sonhos
      - key: MAX_FILE_SIZE_MB
        value: "8"
      - key: DATABASE_URL
        fromDatabase:
          name: closet-sonhos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MELI_CLIENT_ID
        sync: false
      - key: MELI_CLIENT_SECRET
        sync: false
      - key: MELI_REDIRECT_URI
        sync: false
      - key: MELI_TOKEN_ENCRYPTION_KEY
        sync: false

databases:
  - name: closet-sonhos-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
